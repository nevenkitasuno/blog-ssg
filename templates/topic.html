<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Name}}</title>
    <link rel="stylesheet" href="{{.CSS}}">
    <link rel="icon" href="{{.Icon}}" type="image/png">
</head>
<body>
    <h1>{{.Name}}</h1>

    <ul class="archive-nav archive-years">
        {{range .Years}}
        <li><a href="#year-{{.Year}}">{{.Year}}</a></li>
        {{end}}
    </ul>
    {{if .Tags}}
    <ul class="archive-nav archive-tags">
        {{range .Tags}}
        <li>{{if .Current}}{{.Name}}{{else if .URL}}<a href="{{.URL}}">{{.Name}}</a>{{else}}{{.Name}}{{end}}</li>
        {{end}}
    </ul>
    {{end}}

    {{range .Years}}
    <h2 id="year-{{.Year}}">{{.Year}}</h2>
    <ul>
        {{range .Entries}}
        <li><a href="{{.URL}}">{{.Label}}</a></li>
        {{end}}
    </ul>
    {{end}}
</body>
</html>
